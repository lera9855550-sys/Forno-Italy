<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FORNO — Pasta worth crossing the city for · Trastevere, Roma</title>
  <meta name="description" content="A tiny Roman trattoria with hand-rolled pasta, wood-fired pizza, and tiramisù your nonna would approve of — Trastevere, Roma." />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bowlby+One&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Caveat:wght@500;600;700&display=swap" rel="stylesheet" />

  <!-- Tailwind Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cream: '#f6ecd9',
            'cream-soft': '#fbf3e2',
            tomato: '#d83a2a',
            'tomato-deep': '#b32a1c',
            wine: '#6e1a18',
            olive: '#6b7a3a',
            basil: '#4f7a3c',
            pasta: '#f2c94c',
            parmesan: '#efd07a',
            espresso: '#3a241a',
            mozzarella: '#fdf8ee',
            background: '#f6ecd9',
            foreground: '#3a241a',
            muted: '#ece1c8',
            'muted-foreground': '#6f5a44',
            border: 'rgba(58, 36, 26, 0.14)',
          },
          fontFamily: {
            display: ['"Bowlby One"', 'system-ui', 'sans-serif'],
            body: ['"DM Sans"', 'system-ui', 'sans-serif'],
            hand: ['"Caveat"', 'cursive'],
          },
        },
      },
    }
  </script>

  <style>
    :root {
      --cream: #f6ecd9;
      --cream-soft: #fbf3e2;
      --tomato: #d83a2a;
      --tomato-deep: #b32a1c;
      --wine: #6e1a18;
      --olive: #6b7a3a;
      --basil: #4f7a3c;
      --pasta: #f2c94c;
      --parmesan: #efd07a;
      --parmesan-deep: #c9971c;
      --espresso: #3a241a;
      --mozzarella: #fdf8ee;
    }
    html { scroll-behavior: smooth; }
    html, body { height: 100%; margin: 0; }
    #root { min-height: 100%; }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--cream);
      color: var(--espresso);
      background-image:
        radial-gradient(rgba(58, 36, 26, 0.05) 1px, transparent 1px),
        radial-gradient(rgba(58, 36, 26, 0.04) 1px, transparent 1px);
      background-size: 24px 24px, 32px 32px;
      background-position: 0 0, 16px 16px;
    }
    h1, h2, h3, h4 {
      font-family: 'Bowlby One', system-ui, sans-serif;
      font-weight: 400;
      line-height: 0.95;
      letter-spacing: -0.01em;
    }
    /* Unified section heading scale — every H2 uses this so the page has
       one consistent secondary type size. The H1 (Hero) stays larger. */
    .h2-section {
      font-family: 'Bowlby One', system-ui, sans-serif;
      font-weight: 400;
      letter-spacing: -0.01em;
      text-transform: uppercase;
      line-height: 0.9;
      font-size: clamp(2.25rem, 7vw, 6rem);
    }

    /* Menu card description: trim to 3 lines on mobile only (so 2-col cards
       don't get wildly different heights from long descriptions). On larger
       screens the description shows in full. */
    .menu-desc {
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    @media (min-width: 640px) {
      .menu-desc {
        display: block;
        overflow: visible;
      }
    }

    /* ============ Horizontal review carousel ============ */
    .reviews-scroller {
      scroll-snap-type: x mandatory;
      scrollbar-width: none;          /* Firefox */
      -ms-overflow-style: none;       /* IE/old Edge */
      scroll-behavior: smooth;
      overscroll-behavior-x: contain;
    }
    .reviews-scroller::-webkit-scrollbar {
      display: none;                  /* Chrome/Safari */
    }
    .reviews-scroller > * {
      scroll-snap-align: start;
    }
    ::selection { background: var(--tomato); color: var(--cream-soft); }

    /* Float / wobble / dash / marquee animations */
    @keyframes float-y {
      0%, 100% { transform: translateY(0) rotate(var(--r, 0deg)); }
      50% { transform: translateY(-12px) rotate(var(--r, 0deg)); }
    }
    .anim-float { animation: float-y 5s ease-in-out infinite; }

    @keyframes wobble {
      0%, 100% { transform: rotate(var(--r, -6deg)); }
      50% { transform: rotate(calc(var(--r, -6deg) + 6deg)); }
    }
    .anim-wobble { animation: wobble 4s ease-in-out infinite; }

    @keyframes dash-flow {
      to { stroke-dashoffset: -200; }
    }
    .anim-dash { animation: dash-flow 8s linear infinite; }

    @keyframes marquee {
      from { transform: translateX(0); }
      to { transform: translateX(-50%); }
    }
    .anim-marquee { animation: marquee 30s linear infinite; }

    @keyframes soft-pulse {
      0%, 100% { opacity: 0.4; transform: scale(0.95); }
      50%      { opacity: 0.7; transform: scale(1.05); }
    }
    .anim-soft-pulse { animation: soft-pulse 2.2s ease-in-out infinite; }

    /* ============ Pizza cutter cursor — desktop with fine pointer only ============ */
    @media (hover: hover) and (pointer: fine) {
      html, body {
        cursor: none;
      }
      a, button, input, select, textarea, label, [role="button"], summary {
        cursor: none;
      }
      input[type="text"], input[type="email"], input[type="tel"],
      input[type="date"], input[type="number"], input[type="search"], textarea {
        cursor: text;
      }

      /* Canvas for the "cut" trail behind the cutter */
      .cursor-trail {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 9996;
      }

      /* The pizza cutter itself */
      .cursor-cutter {
        position: fixed;
        top: 0;
        left: 0;
        width: 56px;
        height: 56px;
        pointer-events: none;
        z-index: 9998;
        /* The whole thing pivots on its center so the wheel can spin */
        transform: translate(-50%, -50%);
        transition: opacity 0.2s ease;
        will-change: transform, left, top;
      }
      .cursor-cutter.is-hidden {
        opacity: 0;
      }

      /* Wheel — rotates as the user moves the mouse */
      .cursor-cutter .wheel {
        transform-box: fill-box;
        transform-origin: center;
        transition: transform 0.05s linear;
      }
      .cursor-cutter.is-hovering .wheel {
        transition: transform 0.05s linear, scale 0.25s cubic-bezier(0.34, 1.6, 0.64, 1);
        scale: 1.15;
      }
      .cursor-cutter.is-clicking .wheel {
        transition: transform 0.18s cubic-bezier(0.34, 1.6, 0.64, 1);
      }
    }
    @media (hover: none), (pointer: coarse) {
      .cursor-cutter, .cursor-trail { display: none !important; }
    }


    @keyframes pizza-spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    @keyframes pizza-hover {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      25%      { transform: translateY(-3px) rotate(0.5deg); }
      50%      { transform: translateY(-2px) rotate(0deg); }
      75%      { transform: translateY(-4px) rotate(-0.5deg); }
    }
    @keyframes ember-flicker {
      0%, 100% { opacity: 0.7; transform: translateY(0) scale(1, 1); }
      25%      { opacity: 1;   transform: translateY(-4px) scale(1.05, 1.15); }
      50%      { opacity: 0.9; transform: translateY(-2px) scale(0.95, 1.1); }
      75%      { opacity: 1;   transform: translateY(-5px) scale(1.1, 1.2); }
    }
    @keyframes oven-glow {
      0%, 100% { opacity: 0.45; transform: translate(-50%, -30%) scale(1); }
      50%      { opacity: 0.75; transform: translate(-50%, -30%) scale(1.1); }
    }
    @keyframes pizza-heat-glow {
      0%, 100% { opacity: 0; }
      50%      { opacity: 1; }
    }
    @keyframes loader-dot {
      0%, 100% { opacity: 0.3; transform: translateY(0); }
      50%      { opacity: 1;   transform: translateY(-4px); }
    }
    @keyframes wobble-tilt {
      0%, 100% { transform: rotate(-8deg); }
      50%      { transform: rotate(8deg); }
    }

    #page-loader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: var(--cream);
      background-image:
        radial-gradient(rgba(58, 36, 26, 0.05) 1px, transparent 1px),
        radial-gradient(rgba(58, 36, 26, 0.04) 1px, transparent 1px);
      background-size: 24px 24px, 32px 32px;
      background-position: 0 0, 16px 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 28px;
      opacity: 1;
      transition: opacity 0.6s ease-out;
      font-family: 'DM Sans', system-ui, sans-serif;
    }
    #page-loader.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    /* Pizza container — holds the pizza + the glow + the flames */
    .loader-pizza-wrap {
      position: relative;
      width: 260px;
      height: 280px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    /* Pulsing red/orange glow from below — represents heat rising from flames */
    .loader-glow {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      background: radial-gradient(circle at center,
        rgba(232, 112, 42, 0.55) 0%,
        rgba(242, 201, 76, 0.35) 25%,
        rgba(216, 58, 42, 0.15) 55%,
        rgba(216, 58, 42, 0) 75%);
      animation: oven-glow 1.6s ease-in-out infinite;
      filter: blur(12px);
      pointer-events: none;
      z-index: 0;
    }
    /* The pizza — bigger, hovers above flames (no spin — it's reacting to heat) */
    .loader-pizza {
      width: 210px;
      height: 210px;
      position: relative;
      z-index: 2;
      animation: pizza-hover 2.4s ease-in-out infinite;
      filter: drop-shadow(0 6px 12px rgba(58, 36, 26, 0.25));
    }
    .loader-pizza svg {
      width: 100%;
      height: 100%;
      display: block;
    }
    /* Heat shimmer — bottom of pizza pulses warmer with the flame */
    .loader-pizza .heat-glow {
      animation: pizza-heat-glow 1.6s ease-in-out infinite;
    }

    /* Bigger, taller flames that lick at the pizza's bottom */
    .loader-flame {
      position: absolute;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      align-items: flex-end;
      z-index: 1;
    }
    .loader-flame span {
      display: block;
      width: 14px;
      height: 28px;
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      background: linear-gradient(to top, var(--tomato) 0%, var(--pasta) 70%, #fff8d6 100%);
      animation: ember-flicker 0.7s ease-in-out infinite;
      transform-origin: bottom center;
    }
    .loader-flame span:nth-child(1) { animation-delay: 0s;    height: 26px; }
    .loader-flame span:nth-child(2) { animation-delay: 0.2s;  height: 38px; width: 18px; }
    .loader-flame span:nth-child(3) { animation-delay: 0.05s; height: 30px; }
    .loader-flame span:nth-child(4) { animation-delay: 0.3s;  height: 34px; width: 16px; }
    .loader-flame span:nth-child(5) { animation-delay: 0.15s; height: 24px; }

    /* Progress: circular ring around the pizza + numeric % below */
    .loader-progress-ring {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 240px;
      height: 240px;
      z-index: 3;
      pointer-events: none;
    }
    .loader-progress-ring circle {
      fill: none;
      stroke-linecap: round;
    }
    .loader-progress-ring .ring-bg {
      stroke: rgba(58, 36, 26, 0.12);
      stroke-width: 4;
    }
    .loader-progress-ring .ring-fg {
      stroke: var(--tomato);
      stroke-width: 5;
      stroke-dasharray: 691.15; /* 2π × 110 */
      stroke-dashoffset: 691.15;
      transform: rotate(-90deg);
      transform-origin: center;
      transition: stroke-dashoffset 0.3s ease-out;
    }
    .loader-percent {
      font-family: 'Bowlby One', system-ui, sans-serif;
      color: var(--tomato);
      font-size: 22px;
      letter-spacing: 0.04em;
      min-width: 70px;
      text-align: center;
    }

    .loader-sticker {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 999px;
      border: 2px solid var(--espresso);
      box-shadow: 3px 3px 0 var(--espresso);
      background: var(--pasta);
      color: var(--espresso);
      font-family: 'Bowlby One', system-ui, sans-serif;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      animation: wobble-tilt 3s ease-in-out infinite;
    }
    .loader-caption {
      font-family: 'Caveat', cursive;
      color: var(--tomato);
      font-size: 28px;
      transform: rotate(-3deg);
    }
    .loader-dots {
      display: inline-flex;
      gap: 5px;
      margin-left: 4px;
    }
    .loader-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--tomato);
      animation: loader-dot 1.1s ease-in-out infinite;
    }
    .loader-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loader-dots span:nth-child(3) { animation-delay: 0.4s; }

    .loader-brand {
      font-family: 'Bowlby One', system-ui, sans-serif;
      color: var(--tomato);
      font-size: 36px;
      letter-spacing: 0.02em;
      transform: rotate(-2deg);
    }

    /* Reveal on scroll — uses individual translate/scale properties so it composes
       with any transform-based classes (Tailwind hover:-translate-y, -rotate-N, etc.) */
    [data-reveal] {
      opacity: 0;
      translate: 0 30px;
      transition: opacity 0.7s ease-out, translate 0.7s ease-out, scale 0.7s ease-out, rotate 0.7s ease-out;
    }
    [data-reveal][data-from="left"]  { translate: -40px 0; }
    [data-reveal][data-from="right"] { translate: 40px 0; }
    [data-reveal][data-from="up"]    { translate: 0 60px; }
    [data-reveal][data-from="scale"] { translate: 0 0; scale: 0.92; }

    /* Pop — springy overshoot: arrives slightly bigger then settles. */
    [data-reveal][data-from="pop"]   { translate: 0 0; scale: 0.5; opacity: 0; }
    [data-reveal][data-from="pop"].in {
      scale: 1;
      transition: opacity 0.5s ease-out, scale 0.7s cubic-bezier(0.34, 1.8, 0.64, 1);
    }

    /* Tilt — flies in with a rotation that straightens out. */
    [data-reveal][data-from="tilt"]  { translate: 0 40px; rotate: -8deg; }
    [data-reveal][data-from="tilt-r"] { translate: 0 40px; rotate: 8deg; }

    /* Peek — slides in horizontally with a soft bounce. */
    [data-reveal][data-from="peek-l"] { translate: -60px 0; rotate: -4deg; opacity: 0; }
    [data-reveal][data-from="peek-r"] { translate: 60px 0;  rotate: 4deg;  opacity: 0; }
    [data-reveal][data-from="peek-l"].in,
    [data-reveal][data-from="peek-r"].in {
      transition: opacity 0.6s ease-out, translate 0.7s cubic-bezier(0.34, 1.5, 0.64, 1), rotate 0.7s cubic-bezier(0.34, 1.5, 0.64, 1);
    }

    [data-reveal].in {
      opacity: 1;
      translate: 0 0;
      scale: 1;
      rotate: 0deg;
    }

    [data-reveal-rot] {
      opacity: 0;
      transform: translateY(20px) rotate(0deg);
      transition: opacity 0.7s ease-out, transform 0.7s ease-out;
    }
    [data-reveal-rot].in {
      opacity: 1;
      transform: translateY(0) rotate(var(--final-rot, 0deg));
    }

    /* ============ Hover micro-animations ============ */
    /* Card that lifts and casts a deeper shadow on hover */
    .hover-lift {
      transition: translate 0.25s ease-out, box-shadow 0.25s ease-out;
    }
    .hover-lift:hover {
      translate: 0 -4px;
    }

    /* Icon that spins on parent hover (use with .group on the parent) */
    @keyframes icon-pop {
      0%   { transform: rotate(0deg) scale(1); }
      40%  { transform: rotate(-10deg) scale(1.15); }
      100% { transform: rotate(12deg) scale(1.1); }
    }
    .group:hover .group-icon-pop {
      animation: icon-pop 0.4s ease-out forwards;
    }

    /* Price that wiggles on parent hover */
    @keyframes price-pulse {
      0%, 100% { transform: scale(1) rotate(0deg); }
      30%      { transform: scale(1.15) rotate(-3deg); }
      60%      { transform: scale(1.1) rotate(2deg); }
    }
    .group:hover .group-price-wiggle {
      animation: price-pulse 0.55s ease-out;
    }

    /* Underline that draws in from left on parent hover */
    .hover-underline {
      position: relative;
    }
    .hover-underline::after {
      content: '';
      position: absolute;
      left: 0; bottom: -2px;
      width: 100%;
      height: 2px;
      background: var(--tomato);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s ease-out;
    }
    .hover-underline:hover::after {
      transform: scaleX(1);
    }

    /* Image slow zoom (already used on menu cards, refine timing) */
    .img-zoom { transition: transform 0.7s cubic-bezier(0.16, 1, 0.3, 1); }
    .group:hover .img-zoom { transform: scale(1.08); }

    /* Hero pizza pop-in */
    @keyframes pop-in {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }
    .anim-pop { animation: pop-in 0.8s ease-out both; }

    /* hide spinner buttons on number inputs */
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  </style>

  <!-- React + Babel via CDN -->
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <!-- Page loader — visible immediately, hidden once React mounts -->
  <div id="page-loader" aria-hidden="true">
    <div class="loader-sticker">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/>
      </svg>
      wood-fired in progress
    </div>

    <div class="loader-pizza-wrap">
      <!-- Pulsing oven glow behind the pizza -->
      <div class="loader-glow" aria-hidden="true"></div>

      <!-- Progress ring around the pizza -->
      <svg class="loader-progress-ring" viewBox="0 0 240 240" aria-hidden="true">
        <circle class="ring-bg" cx="120" cy="120" r="110" />
        <circle id="loader-ring-fg" class="ring-fg" cx="120" cy="120" r="110" />
      </svg>

      <!-- The pizza -->
      <div class="loader-pizza">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <!-- Outer crust ring (golden brown) -->
          <circle cx="50" cy="50" r="46" fill="#c9971c" stroke="#3a241a" stroke-width="3" />
          <!-- Charred crust spots around the edge -->
          <circle cx="15" cy="42" r="3" fill="#3a241a" opacity="0.55" />
          <circle cx="22" cy="78" r="2.5" fill="#3a241a" opacity="0.5" />
          <circle cx="78" cy="80" r="3" fill="#3a241a" opacity="0.6" />
          <circle cx="85" cy="35" r="2.5" fill="#3a241a" opacity="0.5" />
          <circle cx="50" cy="9" r="2.5" fill="#3a241a" opacity="0.55" />

          <!-- Cheese / sauce inner circle -->
          <circle cx="50" cy="50" r="36" fill="#f2c94c" stroke="#3a241a" stroke-width="2" />
          <!-- Sauce blobs for texture (translucent red) -->
          <ellipse cx="32" cy="42" rx="8" ry="6" fill="#d83a2a" opacity="0.4" />
          <ellipse cx="62" cy="58" rx="9" ry="7" fill="#d83a2a" opacity="0.4" />
          <ellipse cx="58" cy="32" rx="6" ry="5" fill="#d83a2a" opacity="0.35" />
          <ellipse cx="38" cy="65" rx="7" ry="5" fill="#d83a2a" opacity="0.35" />

          <!-- Pepperoni — 4 pieces -->
          <g stroke="#3a241a" stroke-width="2">
            <circle cx="35" cy="36" r="6.5" fill="#d83a2a" />
            <circle cx="65" cy="40" r="6"   fill="#d83a2a" />
            <circle cx="40" cy="62" r="5.5" fill="#d83a2a" />
            <circle cx="62" cy="64" r="6.5" fill="#d83a2a" />
          </g>

          <!-- Basil leaves — 3 little ones -->
          <g stroke="#3a241a" stroke-width="1.5">
            <ellipse cx="50" cy="46" rx="4" ry="2.5" fill="#4f7a3c" transform="rotate(-25 50 46)" />
            <ellipse cx="28" cy="54" rx="3.5" ry="2" fill="#4f7a3c" transform="rotate(40 28 54)" />
            <ellipse cx="70" cy="52" rx="3.5" ry="2" fill="#4f7a3c" transform="rotate(-30 70 52)" />
          </g>

          <!-- Subtle cheese highlights (light cream dots) -->
          <circle cx="45" cy="50" r="2" fill="#fbf3e2" opacity="0.55" />
          <circle cx="55" cy="48" r="1.5" fill="#fbf3e2" opacity="0.45" />
          <circle cx="48" cy="58" r="1.2" fill="#fbf3e2" opacity="0.45" />

          <!-- Heat shimmer overlay on bottom half (pulses with flames) -->
          <defs>
            <radialGradient id="heat-rgrad" cx="50%" cy="100%" r="60%">
              <stop offset="0%" stop-color="#fff8d6" stop-opacity="0.65" />
              <stop offset="50%" stop-color="#f2c94c" stop-opacity="0.3" />
              <stop offset="100%" stop-color="#d83a2a" stop-opacity="0" />
            </radialGradient>
          </defs>
          <circle class="heat-glow" cx="50" cy="50" r="46" fill="url(#heat-rgrad)" />
        </svg>
      </div>

  <script>
    // Loader manager: tracks fake-progress until React mounts, then 100% + fade.
    // The progress bar accelerates as React gets closer to ready.
    (function() {
      const loader  = document.getElementById('page-loader');
      const root    = document.getElementById('root');
      const ringFg  = document.getElementById('loader-ring-fg');
      const pctText = document.getElementById('loader-percent');
      const minDuration = 1200; // ms — minimum loader display so animation reads
      const startedAt = performance.now();

      // Stroke math — must match CSS: circle r=110, circumference = 2π·110 ≈ 691.15
      const CIRCUMFERENCE = 2 * Math.PI * 110;

      let progress = 0;       // 0..100
      let target = 0;         // where we're heading
      let reactReady = false;
      let finishing = false;

      function setProgress(p) {
        progress = Math.max(0, Math.min(100, p));
        const offset = CIRCUMFERENCE * (1 - progress / 100);
        if (ringFg) ringFg.style.strokeDashoffset = offset;
        if (pctText) pctText.textContent = Math.round(progress) + '%';
      }

      // Tick: ease progress toward target, never jumping
      function tick() {
        if (!finishing) {
          // Phase 1: creep toward target. Speed proportional to gap.
          const diff = target - progress;
          if (diff > 0.01) progress += diff * 0.08;
          setProgress(progress);

          // Gradually push target upward in stages — fake-real progress curve.
          // Until React is ready, max out at 85%. After it's ready, allow 100%.
          if (!reactReady) {
            const elapsed = performance.now() - startedAt;
            // Asymptotic curve: target = 85 * (1 - e^(-t/1200))
            target = 85 * (1 - Math.exp(-elapsed / 1200));
          } else {
            target = 100;
          }
        }
        if (progress < 99.5 || !reactReady) {
          requestAnimationFrame(tick);
        } else {
          // Snap to exactly 100 and call hide
          setProgress(100);
          if (!finishing) {
            finishing = true;
            hide();
          }
        }
      }
      requestAnimationFrame(tick);

      function hide() {
        const elapsed = performance.now() - startedAt;
        const delay = Math.max(0, minDuration - elapsed);
        setTimeout(() => {
          loader.classList.add('fade-out');
          setTimeout(() => loader.remove(), 700);
        }, delay);
      }

      // Poll #root until React has mounted something — then trigger final ramp
      const checkInterval = setInterval(() => {
        if (root && root.children.length > 0) {
          clearInterval(checkInterval);
          reactReady = true;
        }
      }, 80);

      // Safety: force-finish after 8s no matter what
      setTimeout(() => {
        clearInterval(checkInterval);
        reactReady = true;
      }, 8000);
    })();
  </script>

  <script>
    (function() {
      if (!window.matchMedia('(hover: hover) and (pointer: fine)').matches) return;

      const cutter = document.querySelector('.cursor-cutter');
      const canvas = document.querySelector('.cursor-trail');
      const wheel = cutter && cutter.querySelector('.wheel');
      if (!cutter || !canvas || !wheel) return;

      const ctx = canvas.getContext('2d');
      const dpr = window.devicePixelRatio || 1;

      function resizeCanvas() {
        canvas.width  = window.innerWidth * dpr;
        canvas.height = window.innerHeight * dpr;
        canvas.style.width  = window.innerWidth + 'px';
        canvas.style.height = window.innerHeight + 'px';
        ctx.scale(dpr, dpr);
      }
      resizeCanvas();
      window.addEventListener('resize', resizeCanvas);

      // Trail = array of recent segments. Each segment fades over `LIFE` ms.
      const LIFE = 1400;
      const segments = []; // { x1,y1,x2,y2, born }

      let mouseX = window.innerWidth / 2;
      let mouseY = window.innerHeight / 2;
      let prevX = mouseX;
      let prevY = mouseY;
      let wheelAngle = 0; // degrees
      let lastClickKick = 0; // extra rotation applied on click

      window.addEventListener('mousemove', (e) => {
        prevX = mouseX;
        prevY = mouseY;
        mouseX = e.clientX;
        mouseY = e.clientY;
        cutter.classList.remove('is-hidden');

        // Position the cutter
        cutter.style.left = mouseX + 'px';
        cutter.style.top  = mouseY + 'px';

        // Rotate the wheel based on distance travelled.
        // Wheel circumference ~ 2π·13 ≈ 82px. So 82px of travel = 360°.
        const dx = mouseX - prevX;
        const dy = mouseY - prevY;
        const dist = Math.hypot(dx, dy);
        // Direction matters: rotate one way for rightward motion, the other for leftward.
        // We use the horizontal component sign as the dominant direction indicator.
        const dir = dx >= 0 ? 1 : -1;
        wheelAngle += dir * (dist / 82) * 360;
        wheel.style.transform = `rotate(${wheelAngle + lastClickKick}deg)`;

        // Add a fresh trail segment if we actually moved
        if (dist > 0.5) {
          segments.push({ x1: prevX, y1: prevY, x2: mouseX, y2: mouseY, born: performance.now() });
        }
      }, { passive: true });

      window.addEventListener('mouseleave', () => cutter.classList.add('is-hidden'));
      window.addEventListener('mouseenter', () => cutter.classList.remove('is-hidden'));

      // Click = "press down": kick the wheel an extra quick spin
      window.addEventListener('mousedown', () => {
        cutter.classList.add('is-clicking');
        lastClickKick += 90; // sudden 90° rotation
        wheel.style.transform = `rotate(${wheelAngle + lastClickKick}deg)`;
      });
      window.addEventListener('mouseup', () => {
        cutter.classList.remove('is-clicking');
      });

      // Hover detection — wheel scales up over interactive elements
      const HOVER_SEL = 'a, button, [role="button"], input[type="checkbox"], input[type="radio"], select, summary, label[for]';
      let lastHover = false;
      window.addEventListener('mousemove', (e) => {
        const target = e.target;
        const hovering = target && target.closest && !!target.closest(HOVER_SEL);
        if (hovering !== lastHover) {
          lastHover = hovering;
          cutter.classList.toggle('is-hovering', hovering);
        }
      }, { passive: true });

      // Trail render loop — clears each frame, redraws fresh segments with fading opacity
      function renderTrail() {
        ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
        const now = performance.now();

        // Drop expired segments
        while (segments.length && now - segments[0].born > LIFE) {
          segments.shift();
        }

        for (const s of segments) {
          const age = now - s.born;
          const t = age / LIFE; // 0 → 1
          const alpha = (1 - t) * 0.85;
          ctx.strokeStyle = `rgba(216, 58, 42, ${alpha})`;
          ctx.lineWidth = 2.5;
          ctx.lineCap = 'round';
          // Dashed look so it reads as a "cut" line, not a regular trail
          ctx.setLineDash([6, 5]);
          ctx.lineDashOffset = -age * 0.02;
          ctx.beginPath();
          ctx.moveTo(s.x1, s.y1);
          ctx.lineTo(s.x2, s.y2);
          ctx.stroke();
        }
        ctx.setLineDash([]);

        requestAnimationFrame(renderTrail);
      }
      requestAnimationFrame(renderTrail);
    })();
  </script>

    function useReveal() {
      useEffect(() => {
        const io = new IntersectionObserver((entries) => {
          entries.forEach((e) => {
            if (e.isIntersecting) {
              e.target.classList.add('in');
              io.unobserve(e.target);
            }
          });
        }, { rootMargin: '0px 0px -10% 0px', threshold: 0.1 });

        const SEL = '[data-reveal], [data-reveal-rot]';

        // CRITICAL: Don't start observing until AFTER the page loader has
        // faded out. The loader stays for ~800ms minimum then fades 600ms,
        // so we wait until it's fully gone — that way Hero animations
        // actually play instead of being skipped while the loader covered them.
        let cancelled = false;
        const start = () => {
          if (cancelled) return;
          // Two rAFs guarantee the browser has painted the initial
          // opacity:0 / translate state before we add the `.in` class.
          requestAnimationFrame(() => {
            requestAnimationFrame(() => {
              if (cancelled) return;
              document.querySelectorAll(SEL).forEach((el) => io.observe(el));
            });
          });
        };

        const loader = document.getElementById('page-loader');
        if (loader) {
          // Wait for loader to be removed from the DOM, then start reveals.
          const checkLoader = setInterval(() => {
            if (!document.getElementById('page-loader')) {
              clearInterval(checkLoader);
              start();
            }
          }, 80);
          // Safety: start anyway after 3 seconds in case loader hangs
          setTimeout(() => { clearInterval(checkLoader); start(); }, 3000);
        } else {
          start();
        }

        // Catch dynamically-added elements (e.g., menu items after filter change)
        const mo = new MutationObserver((mutations) => {
          mutations.forEach((m) => {
            m.addedNodes.forEach((node) => {
              if (node.nodeType !== 1) return;
              if (node.matches && node.matches(SEL)) io.observe(node);
              if (node.querySelectorAll) {
                node.querySelectorAll(SEL).forEach((el) => {
                  if (!el.classList.contains('in')) io.observe(el);
                });
              }
            });
          });
        });
        mo.observe(document.body, { childList: true, subtree: true });

        return () => { cancelled = true; io.disconnect(); mo.disconnect(); };
      }, []);
    }

    function useSectionScrollProgress(ref) {
      const [p, setP] = useState(0);
      useEffect(() => {
        let rafId = null;
        const update = () => {
          rafId = null;
          const el = ref.current;
          if (!el) return;
          const rect = el.getBoundingClientRect();
          const vh = window.innerHeight;
          const total = rect.height - vh;
          if (total <= 0) { setP(0); return; }
          const scrolled = -rect.top;
          setP(Math.max(0, Math.min(1, scrolled / total)));
        };
        const onScroll = () => {
          if (rafId == null) rafId = requestAnimationFrame(update);
        };
        window.addEventListener('scroll', onScroll, { passive: true });
        window.addEventListener('resize', update);
        update();
        return () => {
          window.removeEventListener('scroll', onScroll);
          window.removeEventListener('resize', update);
          if (rafId) cancelAnimationFrame(rafId);
        };
      }, [ref]);
      return p;
    }

    // One continuous path winding through all cities. Coords in 0–100 viewBox.
    // Approximate card centers: ROMA(15,12), MILANO(80,30), FIRENZE(20,52), VENEZIA(80,72), NAPOLI(22,92).
    const TRAVEL_PATH = "M 15 10 C 45 4, 78 12, 80 28 C 82 44, 18 38, 20 52 C 22 64, 88 64, 80 72 C 70 84, 8 80, 22 92";

    function Travels() {
      const sectionRef = useRef(null);
      const pathRef = useRef(null);
      const planeRef = useRef(null);
      const svgRef = useRef(null);
      const progress = useSectionScrollProgress(sectionRef);

      // Move the airplane along the SVG path on every scroll-progress change.
      useEffect(() => {
        const path = pathRef.current;
        const plane = planeRef.current;
        const svg = svgRef.current;
        if (!path || !plane || !svg) return;

        let total;
        try { total = path.getTotalLength(); } catch (e) { return; }
        if (!total) return;

        const dist = total * progress;
        const pt = path.getPointAtLength(dist);

        // Sample a small step ahead & behind to compute tangent direction.
        const behind = path.getPointAtLength(Math.max(0, dist - 1.5));
        const ahead  = path.getPointAtLength(Math.min(total, dist + 1.5));

        // Convert path-space delta into screen-space for visually correct rotation,
        // since preserveAspectRatio="none" stretches the viewBox non-uniformly.
        const rect = svg.getBoundingClientRect();
        const dx = (ahead.x - behind.x) / 100 * rect.width;
        const dy = (ahead.y - behind.y) / 100 * rect.height;

        let angle = 0;
        if (Math.abs(dx) + Math.abs(dy) > 0.01) {
          angle = Math.atan2(dy, dx) * 180 / Math.PI;
        }

        plane.style.left = `${pt.x}%`;
        plane.style.top = `${pt.y}%`;
        // +90° because the plane SVG points UP by default
        plane.style.transform = `translate(-50%, -50%) rotate(${angle + 90}deg)`;
      }, [progress]);

          ref={sectionRef}
          id="travels"
          className="relative bg-pasta overflow-hidden"

              style={{ height: 'clamp(1900px, 260vh, 3000px)' }}

                ref={svgRef}
                className="absolute inset-0 w-full h-full pointer-events-none"
                viewBox="0 0 100 100"
                preserveAspectRatio="none"
              >
                <path
                  ref={pathRef}
                  d={TRAVEL_PATH}
                  stroke="var(--parmesan-deep)"
                  strokeWidth="3"
                  strokeDasharray="2.2 1.8"

                >

                </svg>
              </div>

              {/* City cards */}
              {TRAVEL_CITIES.map((c, i) => {
                // Label appears when airplane reaches this city.
                // 5 cities = thresholds at 0, 0.25, 0.5, 0.75, 1.0.
                // Subtract a small offset so the label shows up just BEFORE the
                // plane lands, so the user catches the reveal in their eyeline.
                const reachThreshold = (i / (TRAVEL_CITIES.length - 1)) - 0.04;
                const labelVisible = progress >= reachThreshold;
                return (

    /* ====================== CUTTABLE PIZZA (interactive toy in CTA banner) ====================== */
    function CuttablePizza() {
      // 8 slices, each rendered as an SVG <g> with its own physics state.
      // The pizza disc is centered in a 280×280 SVG. Each slice is a wedge from center.
      const SIZE = 280;
      const CENTER = SIZE / 2;
      const RADIUS = 115;
      const SLICES = 8;

      // Physics state for each slice — kept in refs so we don't trigger React renders
      // every frame. We mutate transform attributes directly on DOM nodes.
      const sliceRefs = useRef([]);
      const physics = useRef(
        Array.from({ length: SLICES }, () => ({ x: 0, y: 0, vx: 0, vy: 0, rot: 0, vr: 0, kicked: false }))
      );

      // For detecting which slice the cursor "cuts" through
      const containerRef = useRef(null);
      const lastMouse = useRef({ x: -1, y: -1 });
      const animFrame = useRef(null);

      // Reset all slices back to assembled state
      const reset = () => {
        physics.current.forEach((p) => {
          p.x = 0; p.y = 0; p.vx = 0; p.vy = 0; p.rot = 0; p.vr = 0; p.kicked = false;
        });
      };

      // Compute slice geometry — a wedge from center to two radial points
      function sliceCenter(i) {
        // Each wedge spans 360/8 = 45°. Its center direction is at (i + 0.5) * 45°.
        const angleDeg = (i + 0.5) * (360 / SLICES) - 90; // -90 so slice 0 points up
        const a = (angleDeg * Math.PI) / 180;
        return { cx: CENTER + Math.cos(a) * RADIUS * 0.55, cy: CENTER + Math.sin(a) * RADIUS * 0.55 };
      }

      // Build the SVG path for slice i — a wedge from center
      function slicePath(i) {
        const startDeg = i * (360 / SLICES) - 90;
        const endDeg = (i + 1) * (360 / SLICES) - 90;
        const a1 = (startDeg * Math.PI) / 180;
        const a2 = (endDeg * Math.PI) / 180;
        const x1 = CENTER + Math.cos(a1) * RADIUS;
        const y1 = CENTER + Math.sin(a1) * RADIUS;
        const x2 = CENTER + Math.cos(a2) * RADIUS;
        const y2 = CENTER + Math.sin(a2) * RADIUS;
        // Large-arc-flag is 0 because each wedge is < 180°
        return `M ${CENTER} ${CENTER} L ${x1} ${y1} A ${RADIUS} ${RADIUS} 0 0 1 ${x2} ${y2} Z`;
      }

      // "Kick" a slice when the cursor passes through its center
      function kickSlice(i, dirX, dirY) {
        const p = physics.current[i];
        if (p.kicked) {
          // Already flying — give it another boost in same direction
          p.vx += dirX * 4;
          p.vy += dirY * 4;
          p.vr += (Math.random() - 0.5) * 12;
          return;
        }
        p.kicked = true;
        // Speed proportional to direction vector, with some randomness
        const speed = 7 + Math.random() * 4;
        p.vx = dirX * speed + (Math.random() - 0.5) * 3;
        p.vy = dirY * speed + (Math.random() - 0.5) * 3 - 2; // slight upward boost
        p.vr = (Math.random() - 0.5) * 20; // rotation kick
      }

      // Mouse-move handler — detect cuts
      useEffect(() => {
        const container = containerRef.current;
        if (!container) return;

        function onMove(e) {
          const rect = container.getBoundingClientRect();
          // Convert mouse coords into SVG coords (SVG is SIZE×SIZE, scaled to container)
          const scale = rect.width / SIZE;
          const mx = (e.clientX - rect.left) / scale;
          const my = (e.clientY - rect.top) / scale;

          if (lastMouse.current.x >= 0) {
            // Check each slice center — if the segment from last to current
            // passes close to it, kick the slice.
            for (let i = 0; i < SLICES; i++) {
              const p = physics.current[i];
              if (p.kicked) continue;
              const center = sliceCenter(i);
              const cx = center.cx + p.x;
              const cy = center.cy + p.y;
              // Distance from slice center to the line segment
              const d = distanceFromSegment(cx, cy, lastMouse.current.x, lastMouse.current.y, mx, my);
              if (d < 32) {
                const dx = mx - lastMouse.current.x;
                const dy = my - lastMouse.current.y;
                const len = Math.hypot(dx, dy) || 1;
                kickSlice(i, dx / len, dy / len);
              }
            }
          }
          lastMouse.current.x = mx;
          lastMouse.current.y = my;
        }

        function onLeave() {
          lastMouse.current.x = -1;
          lastMouse.current.y = -1;
        }

        container.addEventListener('mousemove', onMove);
        container.addEventListener('mouseleave', onLeave);
        return () => {
          container.removeEventListener('mousemove', onMove);
          container.removeEventListener('mouseleave', onLeave);
        };
      }, []);

      // Physics integration loop
      useEffect(() => {
        function tick() {
          const gravity = 0.4;
          const friction = 0.985;
          const bounce = 0.55;

          for (let i = 0; i < SLICES; i++) {
            const p = physics.current[i];
            if (!p.kicked) continue;
            p.vy += gravity;
            p.vx *= friction;
            p.vy *= friction;
            p.vr *= 0.97;
            p.x += p.vx;
            p.y += p.vy;
            p.rot += p.vr;

            // Bounce off frame walls (frame is ~SIZE wide/tall)
            const center = sliceCenter(i);
            const cx = center.cx + p.x;
            const cy = center.cy + p.y;
            const margin = 30;
            if (cx < margin) { p.x += margin - cx; p.vx = -p.vx * bounce; }
            if (cx > SIZE - margin) { p.x -= cx - (SIZE - margin); p.vx = -p.vx * bounce; }
            if (cy < margin) { p.y += margin - cy; p.vy = -p.vy * bounce; }
            if (cy > SIZE - margin) { p.y -= cy - (SIZE - margin); p.vy = -p.vy * bounce * 0.7; }

            // Apply to DOM
            const node = sliceRefs.current[i];
            if (node) {
              const tx = p.x;
              const ty = p.y;
              const sliceC = sliceCenter(i);
              // Rotate around the slice's own center, then translate
              node.setAttribute('transform',
                `translate(${tx} ${ty}) rotate(${p.rot} ${sliceC.cx} ${sliceC.cy})`
              );
            }
          }
          animFrame.current = requestAnimationFrame(tick);
        }
        animFrame.current = requestAnimationFrame(tick);
        return () => { if (animFrame.current) cancelAnimationFrame(animFrame.current); };
      }, []);

      const [resetTick, setResetTick] = useState(0);
      const handleReset = () => {
        reset();
        // Force the DOM transforms to clear immediately too
        sliceRefs.current.forEach((n) => n && n.removeAttribute('transform'));
        setResetTick((t) => t + 1);
      };

      return (
        <div className="relative">
          {/* Frame */}
          <div
            ref={containerRef}
            className="relative bg-cream-soft border-4 border-espresso rounded-3xl shadow-[6px_6px_0_0_var(--tomato)]"
            style={{ width: SIZE, height: SIZE, maxWidth: '100%', aspectRatio: '1 / 1' }}
          >
            <svg viewBox={`0 0 ${SIZE} ${SIZE}`} className="w-full h-full">
              {/* Pizza base (always rendered behind slices, kept as visual ghost) */}
              <circle cx={CENTER} cy={CENTER} r={RADIUS + 4} fill="#c9971c" stroke="#3a241a" strokeWidth="3" opacity="0.25" />

              {/* Slices */}
              {Array.from({ length: SLICES }).map((_, i) => (
                <g key={i} ref={(el) => (sliceRefs.current[i] = el)} style={{ transition: 'none' }}>
                  {/* Cheese base */}
                  <path d={slicePath(i)} fill="#f2c94c" stroke="#3a241a" strokeWidth="3" strokeLinejoin="round" />
                  {/* Crust ring (outer edge highlight) */}
                  <path d={slicePath(i)} fill="none" stroke="#c9971c" strokeWidth="14" strokeLinejoin="round" opacity="0.45"
                        style={{ transform: `scale(0.92)`, transformOrigin: `${CENTER}px ${CENTER}px` }} />
                  {/* Toppings: 1-2 pepperoni dots + 1 basil leaf per slice, deterministically placed */}
                  {sliceToppings(i, CENTER, RADIUS)}
                </g>
              ))}
            </svg>
          </div>

          {/* Hint + reset button */}
          <div className="absolute -top-3 -left-3 z-10">
            <span
              className="inline-flex items-center gap-1 px-3 py-1 rounded-full border-2 border-espresso shadow-[3px_3px_0_0_var(--espresso)] font-display text-[10px] tracking-wide uppercase bg-pasta text-espresso"
              style={{ transform: 'rotate(-6deg)' }}
            >
              cut me!

          <button
            onClick={handleReset}
            className="absolute -bottom-3 -right-3 z-10 bg-tomato text-cream-soft border-2 border-espresso rounded-full px-4 py-1.5 shadow-[3px_3px_0_0_var(--espresso)] hover:-translate-y-0.5 active:translate-x-[1px] active:translate-y-[1px] transition-all font-display uppercase text-xs tracking-wide inline-flex items-center gap-1.5"
            aria-label="Reset pizza"
          >
            <Icon name="rotate-ccw" size={12} /> reset
          </button>

    // Helper: distance from point (px,py) to line segment (x1,y1)-(x2,y2)
    function distanceFromSegment(px, py, x1, y1, x2, y2) {
      const A = px - x1;
      const B = py - y1;
      const C = x2 - x1;
      const D = y2 - y1;
      const dot = A * C + B * D;
      const lenSq = C * C + D * D;
      let t = lenSq > 0 ? dot / lenSq : -1;
      t = Math.max(0, Math.min(1, t));
      const xx = x1 + t * C;
      const yy = y1 + t * D;
      const dx = px - xx;
      const dy = py - yy;
      return Math.hypot(dx, dy);
    }

    // Helper: render toppings for slice i — deterministic placement per slice
    function sliceToppings(i, CENTER, RADIUS) {
      // Place 1-2 pepperonis at fixed offsets along the slice's center line
      const startDeg = i * 45 - 90;
      const midDeg = startDeg + 22.5;
      const a = (midDeg * Math.PI) / 180;
      const inner = 0.45, outer = 0.78;
      const xi = CENTER + Math.cos(a) * RADIUS * inner;
      const yi = CENTER + Math.sin(a) * RADIUS * inner;
      const xo = CENTER + Math.cos(a) * RADIUS * outer;
      const yo = CENTER + Math.sin(a) * RADIUS * outer;
      // Off-axis basil leaf
      const leafA = ((midDeg + (i % 2 === 0 ? -10 : 10)) * Math.PI) / 180;
      const xl = CENTER + Math.cos(leafA) * RADIUS * 0.6;
      const yl = CENTER + Math.sin(leafA) * RADIUS * 0.6;
      return (
        <g>
          <circle cx={xi} cy={yi} r="9" fill="#d83a2a" stroke="#3a241a" strokeWidth="2" />
          <circle cx={xo} cy={yo} r="7" fill="#d83a2a" stroke="#3a241a" strokeWidth="2" />
          <ellipse cx={xl} cy={yl} rx="6" ry="4" fill="#4f7a3c" stroke="#3a241a" strokeWidth="1.5"
                   transform={`rotate(${midDeg + 30} ${xl} ${yl})`} />
        </g>
      );
    }

    /* ====================== CART DRAWER ====================== */
    function CartDrawer({ open, onClose, cart, add, remove, setCart }) {
      const imageMode = React.useContext(ImageModeContext);
      const items = MENU
        .filter((m) => cart[m.id] > 0)
        .map((m) => ({ ...m, qty: cart[m.id] }));
      const subtotal = items.reduce((s, it) => s + it.price * it.qty, 0);
      const itemCount = items.reduce((s, it) => s + it.qty, 0);

      // Close on Escape + lock body scroll while open
      useEffect(() => {
        if (!open) return;
        const onKey = (e) => { if (e.key === 'Escape') onClose(); };
        document.addEventListener('keydown', onKey);
        const prevOverflow = document.body.style.overflow;
        document.body.style.overflow = 'hidden';
        return () => {
          document.removeEventListener('keydown', onKey);
          document.body.style.overflow = prevOverflow;
        };
      }, [open, onClose]);

      const browseMenu = () => {
        onClose();
        setTimeout(() => {
          const el = document.getElementById('menu');
          if (el) el.scrollIntoView({ behavior: 'smooth' });
        }, 220);
      };

      return (
        <React.Fragment>
          {/* Backdrop */}
          <div
            onClick={onClose}
            aria-hidden="true"
            className={`fixed inset-0 z-[60] bg-espresso/40 backdrop-blur-[2px] transition-opacity duration-300 ${
              open ? 'opacity-100 pointer-events-auto' : 'opacity-0 pointer-events-none'
            }`}
          />
          {/* Drawer */}
          <aside
            role="dialog"
            aria-label="Your basket"
            aria-hidden={!open}
            className={`fixed top-0 right-0 z-[61] h-full w-full sm:w-[440px] bg-cream-soft border-l-2 border-espresso flex flex-col transition-transform duration-300 ease-out ${
              open ? 'translate-x-0' : 'translate-x-full'
            }`}
          >
            {/* Header */}
            <header className="flex items-center justify-between px-5 py-4 border-b-2 border-espresso bg-pasta shrink-0">
              <div className="flex items-center gap-3">
                <div className="relative w-11 h-11 rounded-full bg-tomato text-cream-soft border-2 border-espresso flex items-center justify-center shadow-[3px_3px_0_0_var(--espresso)]">
                  <Icon name="shopping-bag" size={18} />
                  {itemCount > 0 && (
                    <span className="absolute -top-2 -right-2 bg-cream-soft border-2 border-espresso text-espresso w-6 h-6 rounded-full flex items-center justify-center text-[10px] font-display">
                      {itemCount}
                    </span>
                  )}
                </div>
                <div>
                  <div className="font-display uppercase text-xl leading-none">Your basket</div>
                  <div className="text-xs text-espresso/70 mt-1">
                    {itemCount === 0
                      ? 'nothing yet — hai fame?'
                      : `${itemCount} plate${itemCount === 1 ? '' : 's'} ready`}
                  </div>
                </div>
              </div>
              <button
                onClick={onClose}
                aria-label="Close basket"
                className="w-10 h-10 rounded-full border-2 border-espresso bg-cream-soft hover:bg-white flex items-center justify-center shadow-[3px_3px_0_0_var(--espresso)] transition-all active:translate-x-[1px] active:translate-y-[1px] active:shadow-[2px_2px_0_0_var(--espresso)]"
              >
                <Icon name="x" size={16} />
              </button>
            </header>

            {/* Items */}
            <div className="flex-1 overflow-y-auto p-5">
              {items.length === 0 ? (
                <div className="h-full flex flex-col items-center justify-center text-center py-12">
                  <div className="w-24 h-24 rounded-full bg-cream border-4 border-espresso shadow-[5px_5px_0_0_var(--espresso)] flex items-center justify-center mb-5 -rotate-6">
                    <Icon name="shopping-bag" size={36} className="text-espresso/40" />
                  </div>
                  <p className="font-hand text-tomato text-3xl -rotate-2 mb-2">la cesta è vuota</p>
                  <h3 className="font-display uppercase text-2xl leading-tight mb-3">
                    Nothing in here yet.
                  </h3>
                  <p className="text-sm text-espresso/70 max-w-[260px] leading-relaxed mb-6">
                    Add a few plates from the menu — we'll keep them warm until you walk in.
                  </p>
                  <PillButton onClick={browseMenu}>
                    Browse the menu <Icon name="chevron-right" size={16} />
                  </PillButton>
                </div>
              ) : (
                <ul className="space-y-3">
                  {items.map((it) => (
                    <li
                      key={it.id}
                      className="bg-white border-2 border-espresso rounded-2xl p-3 flex gap-3 shadow-[4px_4px_0_0_var(--espresso)]"
                    >
                      <div className="w-20 h-20 shrink-0 rounded-xl overflow-hidden border-2 border-espresso">
                        <img src={dishImage(it, imageMode)} alt={it.name} onError={(e) => handleDishImgError(e, it)} className="w-full h-full object-cover" />
                      </div>
                      <div className="flex-1 min-w-0">
                        <div className="flex items-start justify-between gap-2">
                          <div className="min-w-0">
                            <h4 className="font-display uppercase text-base leading-tight truncate">{it.name}</h4>
                            <p className="text-xs text-espresso/60 mt-0.5">€{it.price} · {it.cat}</p>
                          </div>
                          <button
                            onClick={() =>
                              setCart((c) => {
                                const n = { ...c };
                                delete n[it.id];
                                return n;
                              })
                            }
                            aria-label={`Remove ${it.name}`}
                            className="text-espresso/50 hover:text-tomato transition-colors -mt-1 -mr-1 p-1 shrink-0"
                          >
                            <Icon name="x" size={14} />
                          </button>
                        </div>
                        <div className="mt-3 flex items-center justify-between">
                          <div className="flex items-center gap-2 bg-espresso text-cream-soft rounded-full p-1">
                            <button
                              onClick={() => remove(it.id)}
                              aria-label="Decrease quantity"
                              className="w-7 h-7 rounded-full hover:bg-tomato flex items-center justify-center transition-colors"
                            >
                              <Icon name="minus" size={13} />
                            </button>
                            <span className="font-display text-sm w-5 text-center">{it.qty}</span>
                            <button
                              onClick={() => add(it.id)}
                              aria-label="Increase quantity"
                              className="w-7 h-7 rounded-full hover:bg-tomato flex items-center justify-center transition-colors"
                            >
                              <Icon name="plus" size={13} />
                            </button>
                          </div>
                          <span className="font-display text-tomato text-lg">€{it.price * it.qty}</span>
                        </div>
                      </div>
                    </li>
                  ))}
                </ul>
              )}
            </div>

            {/* Footer */}
            {items.length > 0 && (
              <footer className="border-t-2 border-espresso p-5 bg-cream-soft shrink-0">
                <div className="border-2 border-dashed border-espresso/30 rounded-2xl p-4 mb-4">
                  <div className="flex items-baseline justify-between">
                    <span className="font-display uppercase text-sm text-espresso/70">Subtotal</span>
                    <span className="font-display text-tomato text-3xl">€{subtotal}</span>
                  </div>
                  <p className="text-xs text-espresso/60 mt-1">
                    Service & coperto included. Show this list to your waiter on arrival.
                  </p>
                </div>
                <a href="#book" onClick={onClose} className="block">
                  <PillButton className="w-full justify-center">
                    Reserve a table for this
                    <Icon name="chevron-right" size={16} className="transition-transform group-hover:translate-x-1" />
                  </PillButton>
                </a>
                <button
                  onClick={() => setCart({})}
                  className="text-xs text-espresso/60 hover:text-tomato underline mt-3 block mx-auto"
                >
                  clear basket
                </button>
              </footer>
            )}
          </aside>
        </React.Fragment>
      );
    }

    /* ====================== APP ====================== */
    function App() {
      useReveal();
      const imageMode = useLocalImageMode();
      const [cart, setCart] = useState({});
      const [cartOpen, setCartOpen] = useState(false);

      const add = (id) => setCart((c) => ({ ...c, [id]: (c[id] || 0) + 1 }));
      const remove = (id) =>
        setCart((c) => {
          const n = (c[id] || 0) - 1;
          const next = { ...c };
          if (n <= 0) delete next[id];
          else next[id] = n;
          return next;
        });

      return (
        <ImageModeContext.Provider value={imageMode}>
          <div className="relative min-h-screen bg-background text-foreground overflow-x-clip">
            <Nav />
            <main>
              <Hero />
              <Benefits />
              <Travels />
              <MenuSection
                cart={cart}
                add={add}
                remove={remove}
                onOpenCart={() => setCartOpen(true)}
              />
              <Book />
              <Reviews />
              <Footer />
            </main>
            <CartDrawer
              open={cartOpen}
              onClose={() => setCartOpen(false)}
              cart={cart}
              add={add}
              remove={remove}
              setCart={setCart}
            />
          </div>
        </ImageModeContext.Provider>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
